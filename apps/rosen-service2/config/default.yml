db:
  host: localhost
  port: 5432
  username: postgres
  password: ''
  name: rosen_service
healthCheck:
  logging:
    maxErrors: 10
    maxWarns: 10
    duration: 100
  scanner:
    warnDiff: 2
    criticalDiff: 10
  updateInterval: 60
dataAggregator:
  interval: 60
tokenMap:
  onChainTokenMapEnabled: true
  path: config/tokensMap.json
statistics:
  lockedAssetsMetrics:
    interval: 86400
  generalMetrics:
    interval: 86400
  eventCountMetrics:
    interval: 86400
  userEventsMetric:
    interval: 86400
chains:
  ergo:
    initialHeight: 1
    scanInterval: 120
    method: explorer
    explorer:
      connections:
        - url: https://api.ergoplatform.com/
  cardano:
    active: false
    scanInterval: 30
    initialHeight: 1
    koios:
      connections:
        - url: https://api.koios.rest/api/v1/
          timeout: 100
  bitcoin:
    active: false
    initialHeight: 1
    scanInterval: 600
  bitcoin-runes:
    active: false
    unisatUrl: https://open-api.unisat.io
  doge:
    active: false
    initialHeight: 1
    scanInterval: 60
    adapter:
      blockCypher:
        url: https://api.blockcypher.com
  ethereum:
    active: false
    initialHeight: 1
    scanInterval: 60
  binance:
    active: false
    initialHeight: 1
    scanInterval: 10
paths:
  contracts: config/contracts.json
  healthReport: healthReport.json
