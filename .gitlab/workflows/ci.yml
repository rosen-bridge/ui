image: $GITLAB_CI_IMAGE

default:
  interruptible: true

workflow:
  auto_cancel:
    on_job_failure: all

include:
  - component: $CI_SERVER_FQDN/${CI_COMPONENT}

    inputs:
      enable_knip: true
      enable_lint: true
      enable_test: true
      enable_changeset: true
      type_check_cache_paths:
        - node_modules
        - apps/*/node_modules
        - packages/*/node_modules
        - packages/*/dist
        - wallets/*/node_modules
        - wallets/*/dist
        - networks/*/node_modules
        - networks/*/dist
      test_cache_paths:
        - node_modules
        - apps/*/node_modules
        - apps/*/dist
        - networks/*/node_modules
        - networks/*/dist
        - packages/*/node_modules
        - packages/*/dist
        - wallets/*/node_modules
        - wallets/*/dist
